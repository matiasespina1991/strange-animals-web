<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DOOM</title>
    <script src="./js-dos-api.js"></script>
    <style>
      @font-face {
        font-family: "AMI EGA 8x14";
        src: url("/media/fonts/AMI%20EGA%208x14/source.woff") format("woff");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        min-height: 100%;
        overflow: hidden;
        background: #000;
        font-family: "AMI EGA 8x14", "Ubuntu Sans Mono", monospace;
      }

      body {
        display: grid;
        height: 100vh;
        place-items: center;
      }

      #DOOM {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      #DOOM > .dosbox-container {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      #DOOM > .dosbox-container > .dosbox-canvas {
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
      }

      #DOOM > .dosbox-container > .dosbox-overlay {
        background-image: url("./DOOM.png");
        background-position: center;
        background-repeat: no-repeat;
        background-size: 100% 100%;
      }

      #DOOM > .dosbox-container > .dosbox-overlay > .dosbox-start {
        box-sizing: border-box;
        width: 14em;
        margin: 0 auto;
        padding: 8px 0px 8px;
        border: 0;
        background-color: rgb(8 8 8 / 57%);
        color: #f2f0e8;
        font-family: "AMI EGA 8x14", "Ubuntu Sans Mono", monospace;
        font-size: 14px;
        letter-spacing: -0.05em;
        line-height: 1;
        text-decoration: none;
        text-align: center;
        vertical-align: middle;
        white-space: nowrap;
      }

      #DOOM > .dosbox-container > .dosbox-loader > .dosbox-loader-message {
        top: 8px;
        right: auto;
        bottom: auto;
        left: 8px;
        margin: 0;
        color: #b9b6ad;
        font-family: "AMI EGA 8x14", "Ubuntu Sans Mono", monospace;
        font-size: 11px;
        letter-spacing: -0.05em;
        line-height: 1;
        text-align: left;
      }

      #DOOM > .dosbox-container > .dosbox-loader {
        background-color: #000;
      }

      #DOOM > .dosbox-container > .dosbox-loader * {
        color: #b9b6ad;
        font-family: "AMI EGA 8x14", "Ubuntu Sans Mono", monospace;
        font-size: 11px;
      }

      #DOOM .st-loader {
        top: 24px;
        left: 0px;
        margin: 0;
        transform: scale(0.5) translatex(-1.3rem) translatey(-0.5rem);
      }

      #DOOM .st-loader::before,
      #DOOM .st-loader::after,
      #DOOM .st-loader .equal {
        border-color: #b9b6ad;
      }
    </style>
  </head>
  <body>
    <div id="DOOM" class="dosbox-default"></div>

    <script>
      new Dosbox({
        id: "DOOM",
        onload(dosbox) {
          dosbox.run("./DOOM-@evilution.zip", "./DOOM/DOOM.EXE");
        },
      });
    </script>
  </body>
</html>
