<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DOOM</title>
    <script src="./js-dos-api.js"></script>
    <style>
      @font-face {
        font-family: "AMI EGA 8x14";
        src: url("/media/fonts/AMI%20EGA%208x14/source.woff") format("woff");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        min-height: 100%;
        overflow: hidden;
        background: #000;
        font-family: "AMI EGA 8x14", "Ubuntu Sans Mono", monospace;
      }

      body,
      body *,
      #DOOM,
      #DOOM * {
        cursor: none !important;
      }

      body[data-fullscreen="true"],
      body[data-fullscreen="true"] *,
      body[data-fullscreen="true"] #DOOM,
      body[data-fullscreen="true"] #DOOM * {
        cursor: auto !important;
      }

      body {
        display: grid;
        height: 100vh;
        place-items: center;
      }

      #DOOM {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      #DOOM > .dosbox-container {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      #DOOM > .dosbox-container > .dosbox-canvas {
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
      }

      #DOOM > .dosbox-container > .dosbox-overlay {
        background-image: url("./DOOM.png");
        background-position: center;
        background-repeat: no-repeat;
        background-size: 100% 100%;
      }

      #DOOM > .dosbox-container > .dosbox-overlay > .dosbox-start {
        box-sizing: border-box;
        display: block;
        position: absolute;
        top: 50%;
        left: 50%;
        right: auto;
        bottom: auto;
        transform: translate(-50%, -50%);
        width: 14em;
        margin: 0;
        padding: 8px 0px 8px;
        border: 0;
        background-color: rgb(8 8 8 / 71%);
        color: #b9b6ad;
        font-family: "AMI EGA 8x14", "Ubuntu Sans Mono", monospace;
        font-size: clamp(16px, 3.6vmin, 26px);
        letter-spacing: -0.05em;
        line-height: 1;
        text-decoration: none;
        text-align: center;
        user-select: none;
        white-space: nowrap;
        -webkit-user-select: none;
      }

      #DOOM > .dosbox-container > .dosbox-overlay > .dosbox-start:hover {
        background-color: rgb(8 8 8 / 60%);
      }

      #DOOM > .dosbox-container > .dosbox-loader > .dosbox-loader-message {
        top: 8px;
        right: auto;
        bottom: auto;
        left: 8px;
        margin: 0;
        color: #b9b6ad;
        font-family: "AMI EGA 8x14", "Ubuntu Sans Mono", monospace;
        font-size: clamp(13px, 2.8vmin, 20px);
        letter-spacing: -0.05em;
        line-height: 1;
        text-align: left;
        user-select: none;
        -webkit-user-select: none;
      }

      #DOOM > .dosbox-container > .dosbox-loader {
        background-color: #000;
      }

      #DOOM > .dosbox-container > .dosbox-loader * {
        color: #b9b6ad;
        font-family: "AMI EGA 8x14", "Ubuntu Sans Mono", monospace;
        font-size: clamp(13px, 2.8vmin, 20px);
        user-select: none;
        -webkit-user-select: none;
      }

      #DOOM .st-loader {
        top: 24px;
        left: 0px;
        margin: 0;
        transform: scale(0.5) translatex(-1.3rem) translatey(-0.5rem);
      }

      #DOOM .st-loader::before,
      #DOOM .st-loader::after,
      #DOOM .st-loader .equal {
        border-color: #b9b6ad;
      }
    </style>
  </head>
  <body>
    <div id="DOOM" class="dosbox-default"></div>

    <script>
      let fullscreenActive = false;

      const postCursorState = (visible, event) => {
        window.parent.postMessage(
          {
            type: "strangeanimals-doom-cursor",
            visible,
            x: event?.clientX ?? 0,
            y: event?.clientY ?? 0,
          },
          window.location.origin,
        );
      };

      window.addEventListener("pointermove", (event) => {
        if (event.pointerType && event.pointerType !== "mouse") {
          postCursorState(false);
          return;
        }

        if (fullscreenActive) {
          postCursorState(false);
          return;
        }

        postCursorState(true, event);
      });

      window.addEventListener("pointerleave", () => {
        postCursorState(false);
      });

      window.addEventListener("blur", () => {
        postCursorState(false);
      });

      window.addEventListener("dblclick", () => {
        window.parent.postMessage(
          {
            type: "strangeanimals-doom-request-fullscreen",
          },
          window.location.origin,
        );
      });

      window.addEventListener("keydown", (event) => {
        if (event.key !== "Escape") {
          return;
        }

        window.parent.postMessage(
          {
            type: "strangeanimals-doom-exit-fullscreen",
          },
          window.location.origin,
        );
      });

      window.addEventListener("message", (event) => {
        if (event.origin !== window.location.origin) {
          return;
        }

        if (event.data?.type !== "strangeanimals-doom-fullscreen-state") {
          return;
        }

        fullscreenActive = Boolean(event.data.fullscreenActive);
        document.body.dataset.fullscreen = fullscreenActive ? "true" : "false";

        if (fullscreenActive) {
          postCursorState(false);
        }
      });

      new Dosbox({
        id: "DOOM",
        onload(dosbox) {
          dosbox.run("./DOOM-@evilution.zip", "./DOOM/DOOM.EXE");
        },
      });
    </script>
  </body>
</html>
