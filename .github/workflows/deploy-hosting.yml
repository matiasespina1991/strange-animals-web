name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: npm run build

      - name: Authenticate Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/536380283169/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: github-actions-hosting-deploy@strange-animals-web.iam.gserviceaccount.com

      - name: Deploy Firebase Hosting
        run: pnpm dlx firebase-tools deploy --only hosting --project strange-animals-web
