name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: npm run build

      - name: Authenticate Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/536380283169/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: github-actions-hosting-deploy@strange-animals-web.iam.gserviceaccount.com

      - name: Debug Google Cloud auth
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS"
          test -f "$GOOGLE_APPLICATION_CREDENTIALS"
          gcloud auth list
          gcloud projects describe strange-animals-web

      - name: Deploy Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: pnpm dlx firebase-tools deploy --only hosting --project strange-animals-web
